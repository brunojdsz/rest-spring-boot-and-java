name: Continuous Integration with GitHub Actions

on:
  push:
    branches: 
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Login to Docker Hub
      uses: docker/login-action@v4.1.0
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'adopt'
        cache: maven
        
    - name: Build Application JAR
      working-directory: ./
      run: mvn clean package -DskipTests

    - name: Docker Compose Build Application JAR
      working-directory: ./
      run: docker compose build

    - name: Push to Docker Hub Container Registry
      run: |
        docker tag ${{ secrets.DOCKER_USERNAME }}/rest-spring-boot-and-java:latest ${{ secrets.DOCKER_USERNAME }}/rest-spring-boot-and-java:${{ github.run_id }}
        docker push ${{ secrets.DOCKER_USERNAME }}/rest-spring-boot-and-java:${{ github.run_id }}
        docker push ${{ secrets.DOCKER_USERNAME }}/rest-spring-boot-and-java:latest
      
    - name: Update dependency graph
      uses: advanced-security/maven-dependency-submission-action@571e99aab1055c2e71a1e2309b9691de18d6b7d6
